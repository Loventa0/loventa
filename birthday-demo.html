<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:
linear-gradient(135deg,#ff4f93,#ffb347);
min-height:100vh;
color:white;
overflow-x:hidden;
}

.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:40px 20px;
position:relative;
}

.hero::before{
content:'🎉';
position:absolute;
font-size:120px;
top:40px;
left:10%;
animation:float 4s ease-in-out infinite;
}

.hero::after{
content:'🎂';
position:absolute;
font-size:120px;
bottom:40px;
right:10%;
animation:float 5s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}
}

.container{
max-width:1000px;
margin:auto;
}

h1{
font-size:clamp(60px,10vw,130px);
line-height:1;
margin-bottom:25px;
font-weight:700;
}

p{
font-size:22px;
line-height:1.8;
max-width:750px;
margin:auto;
margin-bottom:40px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:60px;
}

.photo{
height:320px;
border-radius:30px;
background-size:cover;
background-position:center;
box-shadow:0 20px 50px rgba(0,0,0,.2);
transition:.4s;
}

.photo:hover{
transform:translateY(-10px) scale(1.02);
}

.btn{
display:inline-block;
padding:18px 35px;
background:white;
color:#ff4f93;
font-weight:700;
border-radius:18px;
text-decoration:none;
font-size:18px;
box-shadow:0 15px 40px rgba(0,0,0,.2);
}

</style>
</head>
<body>

<section class="hero">
<div class="container">

<h1>
Happy Birthday 🎉
</h1>

<p>
Яркий сайт-поздравление с фотографиями,
анимациями, музыкой и праздничной атмосферой.
Такой сайт можно подарить другу,
девушке или близкому человеку.
</p>

<a href="index.html" class="btn">
← Назад
</a>

<div class="gallery">

<div class="photo"
style="background-image:url('https://images.unsplash.com/photo-1464349095431-e9a21285b5f3?q=80&w=1200&auto=format&fit=crop')">
</div>

<div class="photo"
style="background-image:url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30?q=80&w=1200&auto=format&fit=crop')">
</div>

<div class="photo"
style="background-image:url('https://images.unsplash.com/photo-1530103862676-de8c9debad1d?q=80&w=1200&auto=format&fit=crop')">
</div>

</div>

</div>
</section>

</body>
</html>
